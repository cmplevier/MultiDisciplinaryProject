map_server:
  ros__parameters:
    use_sim_time: true
    yaml_filename: ""

amcl:
  ros__parameters:
    use_sim_time: true

    # Frames
    global_frame_id: "map"
    odom_frame_id: "odom"
    base_frame_id: "base_link"

    # Laser topic
    scan_topic: "/scan"

    # TF publication
    tf_broadcast: true
    transform_tolerance: 1.0

    # Initial pose
    # This is useful because it forces AMCL to publish map -> odom at startup.
    # Then RViz can use "map" as Fixed Frame and show the map.
    set_initial_pose: true
    always_reset_initial_pose: false

    initial_pose:
      x: 1.0
      y: 1.0
      z: 0.0
      yaw: 0.0

    # Particle filter
    # Keep enough particles alive for global localization and recovery from a bad initial pose.
    min_particles: 500
    max_particles: 2000
    pf_err: 0.05
    pf_z: 0.99

    # Odometry model noise parameters
    alpha1: 0.2
    alpha2: 0.2
    alpha3: 0.2
    alpha4: 0.2
    alpha5: 0.2

    # Update thresholds
    update_min_d: 0.15
    update_min_a: 0.05

    # Laser model
    laser_model_type: "likelihood_field"
    max_beams: 60
    laser_max_range: 30.0
    laser_min_range: -1.0
    laser_likelihood_max_dist: 2.0

    # Laser model probabilities
    z_hit: 0.75
    z_short: 0.05
    z_max: 0.05
    z_rand: 0.2

    sigma_hit: 0.15
    lambda_short: 0.1

    # Recovery / resampling
    # These inject random particles when the filter confidence drops.
    recovery_alpha_slow: 0.005
    recovery_alpha_fast: 0.3
    resample_interval: 1

    # Motion model
    robot_model_type: "nav2_amcl::OmniMotionModel"

    # Transform / saving rates
    save_pose_rate: 0.5

lifecycle_manager_localization:
  ros__parameters:
    use_sim_time: true
    autostart: true
    node_names: ["map_server", "amcl"]
