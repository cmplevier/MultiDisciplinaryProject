    axis_l_x: 0
    axis_l_y: 1
    axis_r_x: 3
    axis_r_y: 4

    btn_enable: 5
    btn_enable_holonomic: 4
    
    scale_linear_x: 0.35
    scale_linear_y: 0.35
    scale_angular_z: 1.0 # 4.0