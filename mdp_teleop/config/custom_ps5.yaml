joy_node:
  ros__parameters:
    dev: "/dev/input/js0"
    deadzone: 0.1
    autorepeat_rate: 20.0

teleop_joy_node:
  ros__parameters:
    axis_l_x: 0
    axis_l_y: 1
    axis_r_x: 3
    axis_r_y: 4

    btn_enable: 5
    btn_enable_holonomic: 4
    
    scale_linear_x: 0.35
    scale_linear_y: 0.35
    scale_angular_z: 0.5 # 4.0

    axis_dpad_x: 6
    axis_dpad_y: 7

    btn_triangle: 2
    btn_cross: 0
    btn_circle: 1
    btn_square: 3

    joint_limit_min: [-1.57, -1.57, -1.57, -1.57]
    joint_limit_max: [ 1.57,  1.57,  1.57,  1.57]